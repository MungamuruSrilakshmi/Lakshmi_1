<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f8f9fa;
}

/* Header */
header {
    background: linear-gradient(45deg, #ff6b6b, #ff9f43);
    color: white;
    text-align: center;
    padding: 20px;
}

/* Menu Grid */
.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 30px;
}

/* Cards */
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Emoji Style */
.card h2 {
    font-size: 28px;
}

/* Button */
button {
    background: linear-gradient(45deg, #1dd1a1, #10ac84);
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 5px;
}

/* Price */
.price {
    font-weight: bold;
    color: #ff4757;
}

</style>

<script>
function selectFood(food) {
    localStorage.setItem("foodItem", food);
    alert(food + " added! Go to Order page.");
}
</script>

</head>

<body>

<header>
    <h1>🍔 FoodieHub Menu</h1>
    <p>Choose Your Favorite Food</p>
</header>

<div class="menu">

    <div class="card">
        <h2>🍕 Pizza</h2>
        <p class="price">₹250</p>
        <button onclick="selectFood('Pizza')">Order</button>
    </div>

    <div class="card">
        <h2>🍔 Burger</h2>
        <p class="price">₹150</p>
        <button onclick="selectFood('Burger')">Order</button>
    </div>

    <div class="card">
        <h2>🍛 Biryani</h2>
        <p class="price">₹200</p>
        <button onclick="selectFood('Biryani')">Order</button>
    </div>

    <div class="card">
        <h2>🍟 French Fries</h2>
        <p class="price">₹120</p>
        <button onclick="selectFood('Fries')">Order</button>
    </div>

    <div class="card">
        <h2>🥪 Sandwich</h2>
        <p class="price">₹100</p>
        <button onclick="selectFood('Sandwich')">Order</button>
    </div>

    <div class="card">
        <h2>🥤 Cold Drink</h2>
        <p class="price">₹60</p>
        <button onclick="selectFood('Cold Drink')">Order</button>
    </div>

    <div class="card">
        <h2>🍜 Noodles</h2>
        <p class="price">₹140</p>
        <button onclick="selectFood('Noodles')">Order</button>
    </div>

    <div class="card">
        <h2>🍗 Chicken Wings</h2>
        <p class="price">₹220</p>
        <button onclick="selectFood('Chicken Wings')">Order</button>
    </div>

</div>

</body>
</html>
