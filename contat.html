<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
}

/* Header */
header {
    background: #2f3542;
    color: white;
    text-align: center;
    padding: 20px;
}

/* Container */
.container {
    display: flex;
    flex-wrap: wrap;
    padding: 40px;
    gap: 20px;
    justify-content: center;
}

/* Contact Info */
.info {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.info h3 {
    margin-bottom: 15px;
}

/* Form */
.form-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg,#ff6b6b,#ff9f43);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
}

/* Footer */
footer {
    background: #2f3542;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

<script>
function sendMessage() {
    let name = document.getElementById("name").value;
    alert("Thank you " + name + "! Your message has been sent.");
    return false;
}
</script>

</head>

<body>

<header>
    <h1>📞 Contact FoodieHub</h1>
    <p>We are here to help you!</p>
</header>

<div class="container">

    <!-- Contact Info -->
    <div class="info">
        <h3>📍 Our Office</h3>
        <p>Bangalore, India</p>

        <h3>📞 Phone</h3>
        <p>+91 9876543210</p>

        <h3>📧 Email</h3>
        <p>support@foodiehub.com</p>

        <h3>⏰ Working Hours</h3>
        <p>Mon - Sat: 9 AM - 9 PM</p>
    </div>

    <!-- Contact Form -->
    <div class="form-box">
        <h2>Send Message</h2>

        <form onsubmit="return sendMessage()">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

</div>

<footer>
    <p>© 2026 FoodieHub | All Rights Reserved</p>
</footer>

</body>
</html>
