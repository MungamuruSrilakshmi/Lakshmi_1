<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
}

/* Header */
header {
    background: #ff4757;
    color: white;
    text-align: center;
    padding: 15px;
}

/* Cart Container */
.container {
    padding: 20px;
}

/* Cart Item */
.cart-item {
    background: white;
    border-radius: 12px;
    padding: 15px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Buttons */
button {
    background: #ff6b6b;
    border: none;
    padding: 8px 12px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* Total */
.total {
    text-align: center;
    font-size: 22px;
    margin: 20px;
    font-weight: bold;
}

/* Checkout */
.checkout {
    display: block;
    margin: auto;
    background: #1dd1a1;
    padding: 12px 20px;
}
</style>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart() {
    let container = document.getElementById("cartItems");
    let total = 0;
    container.innerHTML = "";

    cart.forEach((item, index) => {
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        container.innerHTML += `
        <div class="cart-item">
            <div>
                <h3>${item.name}</h3>
                <p>₹${item.price} x ${item.qty}</p>
            </div>
            <div>
                <p>₹${itemTotal}</p>
                <button onclick="removeItem(${index})">❌</button>
            </div>
        </div>`;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function checkout() {
    alert("🎉 Order placed successfully!");
    localStorage.removeItem("cart");
    location.reload();
}
</script>

</head>

<body onload="loadCart()">

<header>
    <h1>🛒 Your Cart</h1>
</header>

<div class="container">
    <div id="cartItems"></div>

    <div id="total" class="total"></div>

    <button class="checkout" onclick="checkout()">Checkout</button>
</div>

</body>
</html>
